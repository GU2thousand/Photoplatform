spring.application.name=generate-cloud-backend
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/generatecloud;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=health,info,metrics

app.jwt.secret=generate-cloud-demo-secret-key-for-local-development-please-change
app.jwt.expiration-ms=86400000
app.storage.root=./data/storage
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
