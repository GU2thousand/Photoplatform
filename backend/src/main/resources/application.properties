spring.application.name=generate-cloud-backend
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/generatecloud}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:generatecloud}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:generatecloud}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

management.endpoints.web.exposure.include=health,info,metrics

app.jwt.secret=${APP_JWT_SECRET:generate-cloud-demo-secret-key-for-local-development-please-change}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.seed.enabled=${APP_SEED_ENABLED:true}
app.storage.provider=${STORAGE_PROVIDER:s3}
app.storage.root=${STORAGE_ROOT:./data/storage}
app.storage.bucket=${STORAGE_BUCKET:generatecloud-assets}
app.storage.region=${STORAGE_REGION:us-east-1}
app.storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
app.storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
app.storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
app.storage.path-style-access=${STORAGE_PATH_STYLE_ACCESS:true}
app.storage.auto-create-bucket=${STORAGE_AUTO_CREATE_BUCKET:true}
app.storage.prefix=${STORAGE_PREFIX:generate-cloud}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
