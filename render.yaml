services:
  - type: web
    name: photoplatform-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: photoplatform-db
          property: connectionString
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_SEED_ENABLED
        value: false
      - key: STORAGE_PROVIDER
        value: s3
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_PATH_STYLE_ACCESS
        value: false
      - key: STORAGE_AUTO_CREATE_BUCKET
        value: false
      - key: STORAGE_PREFIX
        value: photoplatform
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: photoplatform-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: photoplatform-db
    plan: basic-256mb
    databaseName: photoplatform
    user: photoplatform
