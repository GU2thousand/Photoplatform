services:
  postgres:
    image: postgres:16-alpine
    container_name: generatecloud-postgres
    environment:
      POSTGRES_DB: generatecloud
      POSTGRES_USER: generatecloud
      POSTGRES_PASSWORD: generatecloud
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U generatecloud -d generatecloud"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: generatecloud-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: generatecloud-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/generatecloud
      SPRING_DATASOURCE_USERNAME: generatecloud
      SPRING_DATASOURCE_PASSWORD: generatecloud
      APP_JWT_SECRET: local-development-secret-key-change-me
      APP_JWT_EXPIRATION_MS: 86400000
      APP_SEED_ENABLED: "true"
      STORAGE_PROVIDER: s3
      STORAGE_BUCKET: generatecloud-assets
      STORAGE_REGION: us-east-1
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PATH_STYLE_ACCESS: "true"
      STORAGE_AUTO_CREATE_BUCKET: "true"
      STORAGE_PREFIX: generate-cloud
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: generatecloud-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  minio-data:
